<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Order | Luxe Watches</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --white: #ffffff; --grey: #1a1a1a; }
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: var(--dark); color: var(--white); 
            padding: 20px; line-height: 1.6;
        }

        .container { max-width: 800px; margin: 40px auto; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-family: 'Playfair Display', serif; color: var(--gold); text-align: center; font-size: 2.5rem; margin-bottom: 40px; }

        /* Section Styling */
        .section-box {
            background: var(--grey); border-radius: 15px; padding: 30px;
            border: 1px solid #333; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .section-title { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin-bottom: 20px; display: block; border-bottom: 1px solid #333; padding-bottom: 10px; }

        /* Form Inputs */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        input {
            width: 100%; background: #000; border: 1px solid #444; color: white;
            padding: 12px; border-radius: 8px; font-size: 1rem; box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--gold); outline: none; }

        .location-btn {
            background: transparent; color: var(--gold); border: 1px solid var(--gold);
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.8rem;
            margin-top: 10px; transition: 0.3s;
        }
        .location-btn:hover { background: var(--gold); color: black; }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #888; font-size: 0.8rem; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 15px 10px; border-bottom: 1px solid #222; }
        .total-row { font-size: 1.5rem; font-weight: 800; color: var(--gold); }

        /* Final Button */
        .process-btn {
            width: 100%; background: var(--gold); color: black; border: none;
            padding: 20px; border-radius: 50px; font-weight: 800; font-size: 1.1rem;
            text-transform: uppercase; cursor: pointer; transition: 0.4s;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }
        .process-btn:hover { transform: scale(1.02); background: white; }

        /* Success Overlay */
        #successOverlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--dark); display: none; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; z-index: 9999;
        }
        #successOverlay h2 { font-family: 'Playfair Display'; font-size: 3rem; color: var(--gold); }
    </style>
</head>
<body>

    <div class="container" id="orderPage">
        <h1>Confirm Your Selection</h1>

        <div class="section-box">
            <span class="section-title">Customer Information</span>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="custName" placeholder="Enter your name" required>
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="custPhone" placeholder="Enter contact number" required>
            </div>
            <div class="input-group">
                <label>Order Date</label>
                <input type="text" id="orderDate" readonly>
            </div>
            <div class="input-group">
                <label>Delivery Address / Live Location</label>
                <input type="text" id="custAddress" placeholder="Fetching location or type address...">
                <button class="location-btn" onclick="getLocation()">📍 Update with Live Location</button>
            </div>
        </div>

        <div class="section-box">
            <span class="section-title">Order Summary</span>
            <table id="orderTable">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Rate</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody id="cartItems">
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="3" style="text-align:right; padding-top:20px;">Net Amount:</td>
                        <td class="total-row" id="netAmount" style="padding-top:20px;">$0</td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <button class="process-btn" onclick="submitOrder()">Process Final Order ➔</button>
    </div>

    <div id="successOverlay">
        <h2>Order Confirmed!</h2>
        <p style="font-size: 1.2rem; opacity: 0.8;">Your timeless piece is being prepared.</p>
        <p style="color: var(--gold); margin-top: 20px;">We will contact you shortly.</p>
        <br>
        <button class="process-btn" style="width: auto; padding: 10px 40px;" onclick="window.location.href='main.html'">Back to Store</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBlwCl6J9lV30HsyHYoqo_sIBYUcIcY-as",
            authDomain: "watchshop-48f6a.firebaseapp.com",
            projectId: "watchshop-48f6a",
            storageBucket: "watchshop-48f6a.firebasestorage.app",
            messagingSenderId: "420233109126",
            appId: "1:420233109126:web:5ee59da9ebf065ecc6bb07" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- FETCH CUSTOMER DATA FROM INDEX.HTML ---
        const savedCustomer = JSON.parse(localStorage.getItem('luxe_customer'));
        if (savedCustomer) {
            document.getElementById('custName').value = savedCustomer.name || "";
            document.getElementById('custPhone').value = savedCustomer.contact || "";
            document.getElementById('custAddress').value = savedCustomer.address || "";
        }

        // Load Cart Data
        const cart = JSON.parse(localStorage.getItem('luxe_cart')) || [];
        const cartTable = document.getElementById('cartItems');
        let total = 0;

        cart.forEach(item => {
            const lineTotal = item.qty * item.price;
            total += lineTotal;
            cartTable.innerHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>${item.qty}</td>
                    <td>$${item.price}</td>
                    <td>$${lineTotal}</td>
                </tr>
            `;
        });
        document.getElementById('netAmount').innerText = `$${total}`;

        // Set Date
        document.getElementById('orderDate').value = new Date().toLocaleString();

        // Location Function
        window.getLocation = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    document.getElementById('custAddress').value = 
                        `Lat: ${pos.coords.latitude}, Lon: ${pos.coords.longitude}`;
                }, () => {
                    alert("Location access denied. Please type manually.");
                });
            }
        };

        // Submit to Firebase
        window.submitOrder = async () => {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;

            if(!name || !phone || !address) {
                alert("Please fill in all details");
                return;
            }

            const orderData = {
                customerName: name,
                customerPhone: phone,
                address: address,
                date: document.getElementById('orderDate').value,
                items: cart,
                totalAmount: total,
                status: "Pending"
            };

            try {
                await addDoc(collection(db, "orders"), orderData);
                localStorage.removeItem('luxe_cart'); 
                document.getElementById('orderPage').style.display = 'none';
                document.getElementById('successOverlay').style.display = 'flex';
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("Order failed. Please try again.");
            }
        };
    </script>
</body>
</html>
